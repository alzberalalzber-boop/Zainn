name: Build APK with Docker
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kivy/buildozer-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build APK
        run: yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Zain-App
          path: bin/*.apk 
