name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Install Android Build Tools (fix for aidl)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget https://dl.google.com/android/repository/build-tools_r30.0.3-linux.zip
          mkdir -p /usr/local/android-sdk/build-tools
          unzip build-tools_r30.0.3-linux.zip -d /usr/local/android-sdk/build-tools
          echo "$PATH:/usr/local/android-sdk/build-tools/30.0.3" >> $GITHUB_PATH
          echo "ANDROID_HOME=/usr/local/android-sdk" >> $GITHUB_ENV

      - name: Build APK
        run: buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Zain-App
          path: bin/*.apk
