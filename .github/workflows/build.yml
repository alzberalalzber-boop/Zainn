name: Build APK (Fix Aidl)
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Install Android Build Tools in Buildozer's path
        run: |
          wget https://dl.google.com/android/repository/build-tools_r30.0.3-linux.zip
          mkdir -p /home/runner/.buildozer/android/platform/android-sdk/build-tools
          unzip -q build-tools_r30.0.3-linux.zip -d /home/runner/.buildozer/android/platform/android-sdk/build-tools
          rm build-tools_r30.0.3-linux.zip

      - name: Build APK
        run: buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Zain-App
          path: bin/*.apk 
